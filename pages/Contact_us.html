        <main>
            <form action="register.html" method="post">

                <label for="firstname">First Name:</label><br>
                <input type="text" id="firstname" name="name" required><br><br>
                
                <label for="lastname">Last Name:</label><br>
                <input type="text" id="lastname" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="age">Age:</label><br>
                <input type="number" id="age" name="age" min="1" max="120"><br><br>

                <label for="gender">Gender:</label><br>
                <select id="gender" name="gender">
                <option value="">-- Select --</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                </select><br><br>

                <input type="checkbox" id="terms" name="TermsOfServices">
                <label for="terms">Accpet Terms & Services</label><br><br>

                <button type="submit">Register</button>

            </form>
        </main>
